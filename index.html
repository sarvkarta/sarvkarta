<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniKnowAI - Your AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        textarea {
            flex: 1;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 12px;
            color: #f8fafc;
            font-size: 1rem;
            resize: none;
            height: 60px;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: #38bdf8;
        }

        .mic-btn {
            background: #ef4444;
            border: none;
            border-radius: 8px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background 0.3s;
        }

        .mic-btn:hover {
            background: #dc2626;
        }

        .mic-btn.listening {
            animation: pulse 1.5s infinite;
            background: #22c55e;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(to right, #38bdf8, #6366f1);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .submit-btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .response-box {
            margin-top: 25px;
            background: #0f172a;
            border-radius: 8px;
            padding: 20px;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #334155;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .status {
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px #22c55e; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>OmniKnowAI</h1>
        
        <div class="input-group">
            <textarea id="userInput" placeholder="Ask me anything or use the microphone..."></textarea>
            <button class="mic-btn" id="micBtn" title="Speak">🎤</button>
        </div>

        <button class="submit-btn" id="submitBtn">Ask Gemini</button>

        <div class="response-box" id="responseBox">Response will appear here...</div>
        <div class="status" id="statusMessage">Ready</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
